<?xml version="1.0" encoding="UTF-8"?>
<svg width="1000" height="700" viewBox="0 0 1000 700" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1117;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1a1d2e;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="teleGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2d6fa8;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1a4a74;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="emailGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3a5a8a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#243d61;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="coreGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e2340;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#151830;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="claudeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c97a3a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#8a5020;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="geminiGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4285c4;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#2a5a9a;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="codexGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3a8a5a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#245a38;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="memGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5a3a8a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#3a2060;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="gitGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8a4a3a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#5a2820;stop-opacity:1"/>
    </linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4a7ab5"/>
    </marker>
    <marker id="arrowGray" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#556"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1000" height="700" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="500" y="34" text-anchor="middle" font-size="17" font-weight="700" fill="#e0e8ff" letter-spacing="0.5">AI Gateway — Internal Architecture</text>
  <text x="500" y="52" text-anchor="middle" font-size="11" fill="#6070a0">parser.js · runner.js · memory.js · git.js · telegram.js · email-poller.js · reply.js</text>

  <!-- ── INPUTS ── -->
  <!-- Telegram -->
  <rect x="30" y="80" width="155" height="88" rx="10" fill="url(#teleGrad)" stroke="#3a8ad4" stroke-width="1.5"/>
  <text x="107" y="103" text-anchor="middle" font-size="13" font-weight="700" fill="#b8dcff">Telegram Bot</text>
  <text x="107" y="121" text-anchor="middle" font-size="10" fill="#7aafdf">telegram.js</text>
  <text x="107" y="138" text-anchor="middle" font-size="9.5" fill="#90b8d8">webhook /telegram/:secret</text>
  <text x="107" y="153" text-anchor="middle" font-size="9" fill="#6090b8">ALLOWED_USER_ID check</text>

  <!-- Email -->
  <rect x="30" y="185" width="155" height="88" rx="10" fill="url(#emailGrad)" stroke="#3a6aaa" stroke-width="1.5"/>
  <text x="107" y="208" text-anchor="middle" font-size="13" font-weight="700" fill="#b8dcff">Email Poller</text>
  <text x="107" y="226" text-anchor="middle" font-size="10" fill="#7aafdf">email-poller.js</text>
  <text x="107" y="243" text-anchor="middle" font-size="9.5" fill="#90b8d8">IMAP poll every 30s</text>
  <text x="107" y="258" text-anchor="middle" font-size="9" fill="#6090b8">domain allowlist · markSeen</text>

  <!-- Arrows: inputs → parser -->
  <line x1="185" y1="118" x2="250" y2="180" stroke="#4a7ab5" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="185" y1="229" x2="250" y2="215" stroke="#4a7ab5" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ── PARSER ── -->
  <rect x="250" y="148" width="175" height="128" rx="10" fill="url(#coreGrad)" stroke="#3a4a80" stroke-width="1.5"/>
  <text x="337" y="170" text-anchor="middle" font-size="13" font-weight="700" fill="#c0d0ff">parser.js</text>
  <rect x="262" y="178" width="151" height="18" rx="4" fill="#0e1228" opacity="0.8"/>
  <text x="337" y="191" text-anchor="middle" font-size="9" fill="#8090c0" font-family="monospace">verbose: prefix → streaming mode</text>
  <rect x="262" y="200" width="151" height="18" rx="4" fill="#0e1228" opacity="0.8"/>
  <text x="337" y="213" text-anchor="middle" font-size="9" fill="#8090c0" font-family="monospace">claude: / codex: / gemini:</text>
  <rect x="262" y="222" width="151" height="18" rx="4" fill="#0e1228" opacity="0.8"/>
  <text x="337" y="235" text-anchor="middle" font-size="9" fill="#8090c0" font-family="monospace">GIT_PATTERNS → gitOps[]</text>
  <rect x="262" y="244" width="151" height="18" rx="4" fill="#0e1228" opacity="0.8"/>
  <text x="337" y="257" text-anchor="middle" font-size="9" fill="#8090c0" font-family="monospace">aiPrompt strips git phrases</text>

  <!-- Arrow: parser → memory -->
  <line x1="425" y1="212" x2="490" y2="212" stroke="#4a7ab5" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ── MEMORY / HISTORY ── -->
  <rect x="490" y="148" width="175" height="128" rx="10" fill="url(#coreGrad)" stroke="#3a4a80" stroke-width="1.5"/>
  <text x="577" y="170" text-anchor="middle" font-size="13" font-weight="700" fill="#c0d0ff">memory.js</text>
  <rect x="502" y="178" width="151" height="18" rx="4" fill="#0e1228" opacity="0.8"/>
  <text x="577" y="191" text-anchor="middle" font-size="9" fill="#8090c0" font-family="monospace">buildPrompt() layers</text>
  <rect x="502" y="200" width="151" height="18" rx="4" fill="#0e1228" opacity="0.8"/>
  <text x="577" y="213" text-anchor="middle" font-size="9" fill="#8090c0" font-family="monospace">memory.md → history → msg</text>
  <rect x="502" y="222" width="151" height="18" rx="4" fill="#0e1228" opacity="0.8"/>
  <text x="577" y="235" text-anchor="middle" font-size="9" fill="#8090c0" font-family="monospace">MAX_HISTORY=10 per channel</text>
  <rect x="502" y="244" width="151" height="18" rx="4" fill="#0e1228" opacity="0.8"/>
  <text x="577" y="257" text-anchor="middle" font-size="9" fill="#8090c0" font-family="monospace">compactHistory() at 20 entries</text>

  <!-- Arrow: memory → runner -->
  <line x1="665" y1="212" x2="730" y2="212" stroke="#4a7ab5" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ── RUNNER ── -->
  <rect x="730" y="148" width="175" height="128" rx="10" fill="url(#coreGrad)" stroke="#3a4a80" stroke-width="1.5"/>
  <text x="817" y="170" text-anchor="middle" font-size="13" font-weight="700" fill="#c0d0ff">runner.js</text>
  <rect x="742" y="178" width="151" height="18" rx="4" fill="#0e1228" opacity="0.8"/>
  <text x="817" y="191" text-anchor="middle" font-size="9" fill="#8090c0" font-family="monospace">claude/codex → stdin + --print</text>
  <rect x="742" y="200" width="151" height="18" rx="4" fill="#0e1228" opacity="0.8"/>
  <text x="817" y="213" text-anchor="middle" font-size="9" fill="#8090c0" font-family="monospace">gemini → --yolo -p arg (no stdin)</text>
  <rect x="742" y="222" width="151" height="18" rx="4" fill="#0e1228" opacity="0.8"/>
  <text x="817" y="235" text-anchor="middle" font-size="9" fill="#8090c0" font-family="monospace">SPAWN_ENV injects TRUST_WORKSPACE</text>
  <rect x="742" y="244" width="151" height="18" rx="4" fill="#0e1228" opacity="0.8"/>
  <text x="817" y="257" text-anchor="middle" font-size="9" fill="#8090c0" font-family="monospace">runStreaming() → onChunk cb</text>

  <!-- ── AI ENGINES ── -->
  <!-- Claude -->
  <rect x="650" y="320" width="140" height="80" rx="8" fill="url(#claudeGrad)" stroke="#d49050" stroke-width="1.5"/>
  <text x="720" y="344" text-anchor="middle" font-size="13" font-weight="700" fill="#ffe0b0">Claude Code</text>
  <text x="720" y="362" text-anchor="middle" font-size="9" fill="#d4aa70" font-family="monospace">claude --print</text>
  <text x="720" y="378" text-anchor="middle" font-size="9" fill="#d4aa70" font-family="monospace">prompt via stdin</text>
  <text x="720" y="392" text-anchor="middle" font-size="9" fill="#b08050">OAuth · Claude Max</text>

  <!-- Gemini -->
  <rect x="810" y="320" width="140" height="80" rx="8" fill="url(#geminiGrad)" stroke="#5090d4" stroke-width="1.5"/>
  <text x="880" y="344" text-anchor="middle" font-size="13" font-weight="700" fill="#b8d8ff">Gemini CLI</text>
  <text x="880" y="362" text-anchor="middle" font-size="9" fill="#80b0e0" font-family="monospace">gemini --yolo -p</text>
  <text x="880" y="378" text-anchor="middle" font-size="9" fill="#80b0e0" font-family="monospace">no stdin (agentic hang fix)</text>
  <text x="880" y="392" text-anchor="middle" font-size="9" fill="#6090c0">OAuth · Google account</text>

  <!-- Codex -->
  <rect x="810" y="416" width="140" height="80" rx="8" fill="url(#codexGrad)" stroke="#50a070" stroke-width="1.5"/>
  <text x="880" y="440" text-anchor="middle" font-size="13" font-weight="700" fill="#b0f0d0">Codex CLI</text>
  <text x="880" y="458" text-anchor="middle" font-size="9" fill="#80d0a0" font-family="monospace">codex --quiet</text>
  <text x="880" y="474" text-anchor="middle" font-size="9" fill="#80d0a0" font-family="monospace">prompt via stdin</text>
  <text x="880" y="488" text-anchor="middle" font-size="9" fill="#60a080">OAuth · ChatGPT Plus</text>

  <!-- Runner → engines arrows -->
  <line x1="790" y1="240" x2="720" y2="320" stroke="#556" stroke-width="1.2" marker-end="url(#arrowGray)" stroke-dasharray="4,3"/>
  <line x1="817" y1="276" x2="880" y2="320" stroke="#556" stroke-width="1.2" marker-end="url(#arrowGray)" stroke-dasharray="4,3"/>
  <line x1="870" y1="276" x2="880" y2="416" stroke="#556" stroke-width="1.2" marker-end="url(#arrowGray)" stroke-dasharray="4,3"/>

  <!-- ── REPLY ── -->
  <rect x="490" y="320" width="145" height="80" rx="8" fill="url(#coreGrad)" stroke="#3a4a80" stroke-width="1.5"/>
  <text x="562" y="342" text-anchor="middle" font-size="13" font-weight="700" fill="#c0d0ff">reply.js</text>
  <text x="562" y="360" text-anchor="middle" font-size="9" fill="#8090c0" font-family="monospace">chunkText 4000 chars</text>
  <text x="562" y="376" text-anchor="middle" font-size="9" fill="#8090c0" font-family="monospace">Telegram: editMessageText</text>
  <text x="562" y="392" text-anchor="middle" font-size="9" fill="#8090c0" font-family="monospace">Email: SMTP inReplyTo thread</text>

  <!-- Runner → reply -->
  <line x1="730" y1="240" x2="620" y2="320" stroke="#4a7ab5" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Reply → back to inputs -->
  <path d="M490,360 Q200,360 185,229" stroke="#4a7ab5" stroke-width="1.2" fill="none" stroke-dasharray="5,3" marker-end="url(#arrow)"/>

  <!-- ── GIT.JS ── -->
  <rect x="250" y="320" width="225" height="110" rx="8" fill="url(#coreGrad)" stroke="#3a4a80" stroke-width="1.5"/>
  <text x="362" y="342" text-anchor="middle" font-size="13" font-weight="700" fill="#c0d0ff">git.js</text>
  <rect x="262" y="350" width="201" height="18" rx="4" fill="#0e1228" opacity="0.8"/>
  <text x="362" y="363" text-anchor="middle" font-size="9" fill="#8090c0" font-family="monospace">cloneLocks{} — per-repo promise</text>
  <rect x="262" y="372" width="201" height="18" rx="4" fill="#0e1228" opacity="0.8"/>
  <text x="362" y="385" text-anchor="middle" font-size="9" fill="#8090c0" font-family="monospace">ensureCloned() checks .git dir</text>
  <rect x="262" y="394" width="201" height="18" rx="4" fill="#0e1228" opacity="0.8"/>
  <text x="362" y="407" text-anchor="middle" font-size="9" fill="#8090c0" font-family="monospace">GIT_SSH_COMMAND via env var</text>
  <rect x="262" y="416" width="201" height="18" rx="4" fill="#0e1228" opacity="0.8"/>
  <text x="362" y="429" text-anchor="middle" font-size="9" fill="#8090c0" font-family="monospace">runGitOps() sequential, auto-log</text>

  <!-- Parser → git.js (when gitOps detected) -->
  <line x1="337" y1="276" x2="337" y2="320" stroke="#556" stroke-width="1.2" marker-end="url(#arrowGray)" stroke-dasharray="4,3"/>
  <text x="345" y="303" font-size="8.5" fill="#556">if gitOps</text>

  <!-- ── BOTTOM PANELS ── -->
  <!-- Shared Memory store -->
  <rect x="30" y="460" width="200" height="90" rx="8" fill="url(#memGrad)" stroke="#6a4aaa" stroke-width="1.5"/>
  <text x="130" y="481" text-anchor="middle" font-size="12" font-weight="700" fill="#d0b0ff">Shared Memory</text>
  <text x="130" y="498" text-anchor="middle" font-size="9" fill="#a080d0" font-family="monospace">memory.md — all AIs + channels</text>
  <text x="130" y="513" text-anchor="middle" font-size="9" fill="#a080d0" font-family="monospace">history/&lt;channel&gt;.json</text>
  <text x="130" y="528" text-anchor="middle" font-size="9" fill="#8060b0">save with: memory: &lt;fact&gt;</text>
  <text x="130" y="543" text-anchor="middle" font-size="9" fill="#8060b0">compact at 20 entries</text>

  <!-- Git repos store -->
  <rect x="248" y="460" width="200" height="90" rx="8" fill="url(#gitGrad)" stroke="#aa5a4a" stroke-width="1.5"/>
  <text x="348" y="481" text-anchor="middle" font-size="12" font-weight="700" fill="#ffd0b0">Git Repos</text>
  <text x="348" y="498" text-anchor="middle" font-size="9" fill="#d09070" font-family="monospace">repos/ — cloned on first use</text>
  <text x="348" y="513" text-anchor="middle" font-size="9" fill="#d09070" font-family="monospace">SSH key per git instance</text>
  <text x="348" y="528" text-anchor="middle" font-size="9" fill="#b07050">pull / push / commit / diff / log</text>
  <text x="348" y="543" text-anchor="middle" font-size="9" fill="#b07050">REPOS=name:git@github.com:...</text>

  <!-- Streaming detail -->
  <rect x="466" y="460" width="218" height="90" rx="8" fill="url(#coreGrad)" stroke="#3a4a80" stroke-width="1.5"/>
  <text x="575" y="481" text-anchor="middle" font-size="12" font-weight="700" fill="#c0d0ff">Streaming (Telegram)</text>
  <text x="575" y="498" text-anchor="middle" font-size="9" fill="#8090c0" font-family="monospace">verbose: prefix enables live mode</text>
  <text x="575" y="513" text-anchor="middle" font-size="9" fill="#8090c0" font-family="monospace">editMessageText throttled 1500ms</text>
  <text x="575" y="528" text-anchor="middle" font-size="9" fill="#8090c0" font-family="monospace">status msg sent before spawn</text>
  <text x="575" y="543" text-anchor="middle" font-size="9" fill="#6070a0">git ops inject gitLog(repo,5) context</text>

  <!-- Implementation notes -->
  <rect x="702" y="460" width="268" height="90" rx="8" fill="#12141e" stroke="#2a3060" stroke-width="1.5"/>
  <text x="836" y="481" text-anchor="middle" font-size="11" font-weight="700" fill="#8090b0">Implementation Notes</text>
  <text x="836" y="498" text-anchor="middle" font-size="9" fill="#556080" font-family="monospace">gemini uses -p not stdin → prevents hang</text>
  <text x="836" y="513" text-anchor="middle" font-size="9" fill="#556080" font-family="monospace">cloneLocks{} prevents parallel clone race</text>
  <text x="836" y="528" text-anchor="middle" font-size="9" fill="#556080" font-family="monospace">allowUnsafeSshCommand:true for simple-git</text>
  <text x="836" y="543" text-anchor="middle" font-size="9" fill="#556080" font-family="monospace">GEMINI_CLI_TRUST_WORKSPACE hardcoded in env</text>

  <!-- Connector: memory.js ↔ Shared Memory store -->
  <line x1="577" y1="276" x2="130" y2="460" stroke="#6a4aaa" stroke-width="1" fill="none" stroke-dasharray="4,3" marker-end="url(#arrowGray)"/>

  <!-- git.js ↔ Git repos -->
  <line x1="348" y1="430" x2="348" y2="460" stroke="#aa5a4a" stroke-width="1.2" marker-end="url(#arrowGray)"/>

  <!-- Legend bar -->
  <rect x="30" y="572" width="940" height="28" rx="6" fill="#0e1020" opacity="0.7"/>
  <line x1="50" y1="586" x2="80" y2="586" stroke="#4a7ab5" stroke-width="2"/>
  <text x="86" y="590" font-size="9" fill="#6070a0">main data path</text>
  <line x1="160" y1="586" x2="190" y2="586" stroke="#556" stroke-width="1.2" stroke-dasharray="4,3"/>
  <text x="196" y="590" font-size="9" fill="#6070a0">conditional path</text>
  <line x1="280" y1="586" x2="310" y2="586" stroke="#4a7ab5" stroke-width="1.2" stroke-dasharray="5,3"/>
  <text x="316" y="590" font-size="9" fill="#6070a0">reply path</text>
  <text x="500" y="590" text-anchor="middle" font-size="9" fill="#404560">No prefix defaults to Claude · Subject = command (email) · Body = optional context</text>
  <text x="850" y="590" font-size="9" fill="#404560">Node.js · Express · simple-git · nodemailer · imap</text>

  <!-- Border -->
  <rect x="1" y="1" width="998" height="698" rx="12" fill="none" stroke="#1e2440" stroke-width="2"/>
</svg>
